version: '3.8'

services:
  app:
    build: .
    container_name: customer-manager
    ports:
      - "5000:5000"
    volumes:
      # 挂载数据目录，确保数据持久化
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_APP=main.py
      - DATABASE_TYPE=excel
      - EXCEL_DATA_PATH=./data/customers.xlsx
      - LOG_LEVEL=INFO
      # 告诉 Python 导包时把 /app 目录（即项目根目录）作为主模块路径
      - PYTHONPATH=/app
    networks:
      - customer-manager-network
    restart: unless-stopped

networks:
  customer-manager-network:
    driver: bridge
